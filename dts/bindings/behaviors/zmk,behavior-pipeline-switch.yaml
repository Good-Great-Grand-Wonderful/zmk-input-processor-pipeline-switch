description: |
  Cycles the active pipeline of a zmk,input-processor-pipeline-switch
  processor. Param 1 is the cycle offset: 1 for next, -1 for previous.

compatible: "zmk,behavior-pipeline-switch"

include: one_param.yaml

properties:
  processor:
    required: true
    type: phandle
    description: The pipeline-switch input processor to control.
